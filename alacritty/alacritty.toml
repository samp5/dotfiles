[general]
import = [
  "~/dotfiles/alacritty/kanagawa.toml",
]

[window]
opacity=0.9
padding.x = 2
decorations = "None"

[scrolling]
history = 100000

[font]
normal.family = "Iosevka Term"
normal.style = "medium-light"
size = 12

[terminal]
shell.program = "/usr/bin/fish"

[env]
term = "xterm-256color"

[cursor]
style.shape = "Underline"
style.blinking = "Always"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[bell]
animation = "EaseOutExpo"
duration =  50
color = "#16161D"
