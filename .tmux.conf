set-option -g default-shell /usr/bin/bash
set-option -g allow-passthrough on

# Set terminal
set -g default-terminal "tmux-256color"
set -a terminal-features "alacritty:RGB"

# notifications
set -g bell-action any
set -g monitor-bell on

set-option -g @claude-notify-bell on
set-option -g @claude-notify-message on
set-option -g @claude-notify-auto-focus off

set -g default-command fish
set -g editor nvim


# Start window and pane index at 1 not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

#Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# Reset Prefix
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Enable mouse control
set -g mouse on

# clear screen with <prefix> l
bind C-l send-keys 'C-l'

# Set window splitting keys
unbind %
bind ] split-window -h -c "#{pane_current_path}"

unbind '"' 
bind - split-window -v -c "#{pane_current_path}"


#kill-window
bind z kill-window

#Vim-like navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
set-option -g status-keys 'vi'

# Vim-like navigation in copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Select with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Resize pane shortcuts
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

bind -r M resize-pane -Z

# Script runner (scripts/scripts.json, see scripts/tmux for the fzf-popup tools)
unbind r
bind r run-shell "~/dotfiles/scripts/pyscripts/.venv/bin/run-script"

unbind R
bind R source-file ~/.tmux.conf

# add tpm as a plugin
set -g @plugin 'tmux-plugins/tpm'

#tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'


unbind C-o
bind C-o rotate-window -D

########################################################################
# Colors
########################################################################

# Default foreground
set -g @fujiWhite      '#DCD7BA'
# Dark foreground (statuslines)
set -g @oldWhite       '#C8C093'
# Dark background (statuslines and floating windows)
set -g @sumiInk0       '#16161D'
# Default background
set -g @sumiInk1       '#1F1F28'
# Lighter background (colorcolumn, folds)
set -g @sumiInk2       '#2A2A37'
# Lighter background (cursorline)
set -g @sumiInk3       '#363646'
# Darker foreground (line numbers, fold column, non-text characters), float borders
set -g @sumiInk4       '#54546D'
# Popup background, visual selection background
set -g @waveBlue1      '#223249'
# Popup selection background, search background
set -g @waveBlue2      '#2D4F67'
# Diff Add (background)
set -g @winterGreen    '#2B3328'
# Diff Change (background)
set -g @winterYellow   '#49443C'
# Diff Deleted (background)
set -g @winterRed      '#43242B'
# Diff Line (background)
set -g @winterBlue     '#252535'
# Git Add
set -g @autumnGreen    '#76946A'
# Git Delete
set -g @autumnRed      '#C34043'
# Git Change
set -g @autumnYellow   '#DCA561'
# Diagnostic Error
set -g @samuraiRed     '#E82424'
# Diagnostic warning
set -g @roninYellow    '#FF9E3B'
# Diagnostic Info
set -g @waveAqua1      '#6A9589'
# Diagnostic Hint
set -g @dragonBlue     '#658594'
# Comments
set -g @fujiGray       '#727169'
# Light foreground
set -g @springViolet1  '#938AA9'
# Statements and Keywords
set -g @oniViolet      '#957FB8'
# Functions and Titles
set -g @crystalBlue    '#7E9CD8'
# Brackets and punctuation
set -g @springViolet2  '#9CABCA'
# Specials and builtin functions
set -g @springBlue     '#7FB4CA'
# Not used
set -g @lightBlue      '#A3D4D5'
# Types
set -g @waveAqua2      '#7AA89F'
# Strings
set -g @springGreen    '#98BB6C'
# Not used
set -g @boatYellow1    '#938056'
# Operators, RegEx
set -g @boatYellow2    '#C0A36E'
# Identifiers
set -g @carpYellow     '#E6C384'
# Numbers
set -g @sakuraPink     '#D27E99'
# Standout specials 1 (builtin variables)
set -g @waveRed        '#E46876'
# Standout specials 2 (exception handling, return)
set -g @peachRed       '#FF5D62'
# Constants, imports, booleans
set -g @surimiOrange   '#FFA066'
# Deprecated
set -g @katanaGray     '#717C7C'

########################################################################
# STATUS BAR
########################################################################

set-option -g status on

set-window-option -g popup-border-style "fg=#{@sumiInk4}"
set-window-option -g popup-border-lines "rounded"

# Maximum Sizes
set -g status-left-length 30
set -g status-right-length 0

# Background
set-option -g status-style bg="#{@sumiInk2}"

set-option -g status-right ""
set-option -g status-right-style ""

# Set active pane border color
set-option -g pane-active-border-style fg="#{@springGreen}"
# Set inactive pane border color
set-option -g pane-border-style fg="#{@sumiInk3}"
# Set pane lines
set-option -g pane-border-lines heavy


set-option -g menu-selected-style fg="#{@springGreen}"
set-option -g message-style "bg=#{@waveBlue2} fg=#{@oldWhite} bold"
set-option -g mode-style bg="#{@waveBlue1}"


set-option -g status-left "#{?client_prefix,#[bg=#{@springGreen}],}   #S #[bg=#{@sumiInk2}]  "
set-option -g status-left-style "fg=#{@sumiInk0},bg=#{@crystalBlue}"
set-option -g status-position bottom


# Focused
set-window-option -g window-status-current-format " #I #W #F#[bg=#{@sumiInk2}] "
set-window-option -g window-status-current-style "bg=#{@springGreen} fg=#{@sumiInk2} bold"


# Unfocused
set-window-option -g window-status-format " #I #W #F#[bg=#{@sumiInk2}] "

# Notified
set-window-option -g window-status-bell-style "fg=#{@sumiInk3} bg=#{@carpYellow}"


# Set the history limit so we get lots of scrollback.
setw -g history-limit 50000

# Initialize TMUX plugin manager (keep this line at the very bottom of .tmux.conf
run '~/.tmux/plugins/tpm/tpm'
