[git_branch]
format = "[$symbol $branch(:$remote_branch)]($style) "
symbol = ""

[git_commit]
commit_hash_length = 7
format = '[\($hash$tag\)]($style) '
style = "green bold"
only_detached = false
disabled = false

[git_state]
style = "yellow"

[sudo]
disabled = false
format = '[sudo ]($style)'

[character]
success_symbol = '[](bold blue)'
error_symbol = '[](bold red) '
